version: '3.8'

services:
  creativeos-db:
    image: ankane/pgvector:v0.5.1
    container_name: creativeos-demo-db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: demo_password_2025
      POSTGRES_DB: creativeos
    ports:
      - "5433:5432"
    volumes:
      - postgres_demo_data:/var/lib/postgresql/data

  creativeos-redis:
    image: redis:7-alpine
    container_name: creativeos-demo-redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_demo_data:
